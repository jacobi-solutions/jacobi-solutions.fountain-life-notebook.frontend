name: Deploy Static Site

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    name: Build and deploy S3/CloudFront frontend
    runs-on: ubuntu-latest

    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      AWS_ROLE_TO_ASSUME: ${{ vars.AWS_ROLE_TO_ASSUME }}
      FRONTEND_BUCKET_NAME: ${{ vars.FRONTEND_BUCKET_NAME }}
      CLOUDFRONT_DISTRIBUTION_ID: ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}
      VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL || '/api' }}
      VITE_AUTH_MODE: ${{ vars.VITE_AUTH_MODE || 'cognito' }}
      VITE_COGNITO_AUTHORITY: ${{ vars.VITE_COGNITO_AUTHORITY }}
      VITE_COGNITO_CLIENT_ID: ${{ vars.VITE_COGNITO_CLIENT_ID }}
      VITE_COGNITO_REDIRECT_URI: ${{ vars.VITE_COGNITO_REDIRECT_URI }}

    steps:
      - name: Check required variables
        run: |
          test -n "$AWS_REGION"
          test -n "$AWS_ROLE_TO_ASSUME"
          test -n "$FRONTEND_BUCKET_NAME"
          test -n "$CLOUDFRONT_DISTRIBUTION_ID"
          test -n "$VITE_COGNITO_AUTHORITY"
          test -n "$VITE_COGNITO_CLIENT_ID"
          test -n "$VITE_COGNITO_REDIRECT_URI"

      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build static site
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ env.AWS_ROLE_TO_ASSUME }}

      - name: Upload immutable assets
        run: |
          aws s3 sync build/client "s3://$FRONTEND_BUCKET_NAME" \
            --delete \
            --exclude index.html \
            --cache-control "public,max-age=31536000,immutable"

      - name: Upload app shell
        run: |
          aws s3 cp build/client/index.html "s3://$FRONTEND_BUCKET_NAME/index.html" \
            --cache-control "no-cache,no-store,must-revalidate" \
            --content-type "text/html"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "$CLOUDFRONT_DISTRIBUTION_ID" \
            --paths "/*"
